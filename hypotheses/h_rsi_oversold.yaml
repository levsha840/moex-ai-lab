# H-RSI-OVERSOLD: RSI Oversold Bounce (Mean Reversion, Tier A)
#
# Hypothesis: when RSI falls below 30 (oversold), price is statistically
# more likely to bounce back toward the mean — long entry, time-based exit.
#
# To add this hypothesis to research: place this file in hypotheses/ directory.
# No changes to Research Service, Core, or Agent Protocol required.

template_id: tmpl_h_rsi_oversold
name: "RSI Oversold Bounce"
category: "Mean Reversion"
priority: A

title_template: "H-RSI-OVERSOLD on {ticker}"

statement_template: >
  When RSI(14) falls below {rsi_threshold} (oversold), price is expected to
  revert upward — generating a profitable mean-reversion long entry on {ticker}
  with a {hold_bars}-bar time exit.

required_features:
  - rsi_14
  - adx_14
  - atr_14

default_parameters:
  ticker: SBER
  rsi_period: 14
  rsi_threshold: 30.0
  hold_bars: 5

strategy_name: rsi_oversold

provider_factory: experiments.h_rsi_oversold.providers.RsiOversoldProviderFactory
