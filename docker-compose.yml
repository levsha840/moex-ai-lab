services:

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: moex_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: moex_ai
      POSTGRES_USER: moex
      POSTGRES_PASSWORD: moex_pass

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: